<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat To Strangers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="home" id="home">
    <h1>Chat To Strangers</h1>
    <p>Meet new people. Start chatting instantly.</p>
    <p id="onlineCount">Online users: 0</p>

    <button id="startBtn">Start Chat</button>

    <label class="theme-switch">
        <input type="checkbox" class="themeSwitch">
        <span class="slider"></span>
    </label>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <h2>Chat To Strangers</h2>

        <div class="chat-actions">
            <label class="theme-switch">
                <input type="checkbox" class="themeSwitch">
                <span class="slider"></span>
            </label>

            <button id="reportBtn">Report</button>
            <button id="nextBtn">Next</button>
            <button id="leaveBtn">Leave</button>
        </div>
    </div>

    <div class="status" id="status">Searching...</div>

    <div class="messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type your message..." maxlength="1000">
        <button id="sendBtn">Send</button>
    </div>
</div>

<div class="confirm-box" id="confirmBox">
    <div class="confirm-content">
        <h3 id="confirmTitle">Are you sure?</h3>
        <p id="confirmMessage">Do you want to continue?</p>

        <button id="confirmActionBtn">Confirm</button>
        <button id="cancelActionBtn">Cancel</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
