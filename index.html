<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Talk and Chat - Chat with Strangers Online | Talkandchat</title>

    <meta name="description" content="Talkandchat is a free online chat platform to chat with strangers. Start anonymous text chat and random audio chat with new people instantly.">

    <meta name="keywords" content="talkandchat, talk and chat, chat with strangers, stranger chat, online chat, anonymous chat, random chat, audio chat, meet new people">

    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://talkandchat.in/">

    <meta property="og:title" content="Talk and Chat - Chat with Strangers Online">
    <meta property="og:description" content="Talkandchat lets you meet new people instantly with anonymous text chat and audio chat.">
    <meta property="og:url" content="https://talkandchat.in/">
    <meta property="og:type" content="website">

    <meta name="theme-color" content="#00b894">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-512.png">

    <link rel="stylesheet" href="style.css?v=500">
</head>
<body>

    <!-- HOME PAGE -->
    <div id="homePage" class="home-page">
        <div class="home-card">
            <h1>Talk and Chat</h1>

            <p class="tagline">Meet new people. Start chatting instantly.</p>

            <p class="seo-text">
                Talkandchat is an online chat platform to meet new people through random text chat and audio chat.
            </p>

            <div class="home-buttons">
                <button id="startBtn">Start Chat</button>
                <button id="audioCallBtn" onclick="window.location.href='audio.html'">Audio Call</button>

                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                    <span id="themeIcon">☀️</span>
                </button>
            </div>
        </div>
    </div>

    <!-- CHAT PAGE -->
    <div id="chatPage" class="chat-page hidden">

        <div class="chat-header">
            <div class="chat-title-row">
                <h2>Talk and Chat</h2>

                <div class="menu-wrapper">
                    <button id="menuBtn" class="menu-btn" aria-label="Open menu">⋮</button>

                    <div id="menuDropdown" class="menu-dropdown hidden">
                        <a href="privacy.html">Privacy</a>
                        <a href="terms.html">Terms</a>
                        <a href="safety.html">Safety</a>
                        <a href="contact.html">Contact</a>
                    </div>
                </div>
            </div>

            <div class="chat-actions">
                <button id="chatThemeToggle" class="theme-toggle small-theme" aria-label="Toggle theme">
                    <span id="chatThemeIcon">☀️</span>
                </button>

                <button id="reportBtn" class="report-btn">Report</button>
                <button id="nextBtn" class="next-btn">Next</button>
                <button id="leaveBtn" class="leave-btn">Leave</button>
            </div>
        </div>

        <div id="messages" class="messages"></div>

        <div id="status" class="status">Click Start Chat to begin.</div>

        <div class="chat-input">
            <button id="imageBtn" class="image-btn">📷</button>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" hidden>

            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">

            <button id="sendBtn">Send</button>
        </div>
    </div>

    <!-- CONFIRM POPUP -->
    <div class="confirm-box hidden" id="confirmBox">
        <div class="confirm-content">
            <h3 id="confirmTitle">Are you sure?</h3>
            <p id="confirmMessage">Do you want to continue?</p>

            <div class="confirm-buttons">
                <button id="confirmActionBtn">Confirm</button>
                <button id="cancelActionBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js?v=500"></script>

</body>
</html>
