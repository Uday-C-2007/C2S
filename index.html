<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Talk and Chat - Chat with Strangers Online</title>

    <meta name="description" content="Talk and Chat is a free online platform to chat with random strangers instantly. Start anonymous text chat and audio call with new people online.">

    <meta name="keywords" content="talk and chat, talkandchat, talkandchat.in, chat with strangers, random chat, stranger chat, anonymous chat, online chat, audio chat">

    <meta name="author" content="Talk and Chat">

    <meta name="robots" content="index, follow">

    <meta name="google-site-verification" content="XpzTZg4Qmk8K9zJicz4gx5smJz9XB-TaFxgX5YXkodE" />

    <link rel="canonical" href="https://talkandchat.in/">

    <meta property="og:title" content="Talk and Chat - Chat with Strangers Online">
    <meta property="og:description" content="Chat with random strangers online instantly. Free anonymous text chat and audio call.">
    <meta property="og:url" content="https://talkandchat.in/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Talk and Chat">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00b894">

    <link rel="stylesheet" href="style.css?v=800">
</head>
<body>

<details class="top-dot-menu">
    <summary>⋮</summary>

    <div class="top-menu-dropdown">
        <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a>
        <a href="terms.html" target="_blank" rel="noopener noreferrer">Terms</a>
        <a href="safety.html" target="_blank" rel="noopener noreferrer">Safety</a>
        <a href="contact.html" target="_blank" rel="noopener noreferrer">Contact</a>
    </div>
</details>

<div class="home" id="home">
    <h1>Talk and Chat</h1>
    <p>Meet new people. Start chatting instantly.</p>
    <p id="onlineCount">Online users: 0</p>

    <button id="startBtn">Start Chat</button>
    <button id="audioCallBtn" onclick="window.location.href='audio.html'">Audio Call</button>

    <label class="theme-switch">
        <input type="checkbox" class="themeSwitch">
        <span class="slider"></span>
    </label>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <h2>Talk and Chat</h2>

        <div class="chat-actions">
            <label class="theme-switch">
                <input type="checkbox" class="themeSwitch">
                <span class="slider"></span>
            </label>

            <button id="reportBtn">Report</button>
            <button id="nextBtn">Next</button>
            <button id="leaveBtn">Leave</button>
        </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="status" id="status">Searching...</div>

    <div class="chat-input">
        <button id="photoBtn" title="Send photo">📷</button>
        <input type="file" id="photoInput" accept="image/png, image/jpeg, image/webp" hidden>

        <input type="text" id="messageInput" placeholder="Type your message..." maxlength="1000">

        <button id="sendBtn">Send</button>
    </div>
</div>

<div class="confirm-box" id="confirmBox">
    <div class="confirm-content">
        <h3 id="confirmTitle">Are you sure?</h3>
        <p id="confirmMessage">Do you want to continue?</p>

        <button id="confirmActionBtn">Confirm</button>
        <button id="cancelActionBtn">Cancel</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js?v=800"></script>

<script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
    }
</script>

</body>
</html>
