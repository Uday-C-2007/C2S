<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Call - Talk and Chat</title>
    <link rel="stylesheet" href="audio.css?v=300">
</head>
<body>

<div class="audio-page">
    <div class="audio-card">
        <h1>Audio Call</h1>

        <label class="theme-switch audio-theme-switch">
    <input type="checkbox" id="audioThemeSwitch">
    <span class="slider"></span>
</label>

        <p>Talk with a random audio stranger instantly.</p>

        <div class="audio-status" id="audioStatus">Click Start Audio Call</div>

        <audio id="remoteAudio" autoplay playsinline></audio>

        <div class="main-actions">
            <button id="startAudioBtn">Start Audio Call</button>
        </div>

        <div class="call-actions">
    <button id="muteBtn" disabled>Mute Mic</button>
    <button id="nextAudioBtn" disabled>Next</button>
    <button id="reportAudioBtn" disabled>Report</button>
    <button id="leaveAudioBtn" disabled>Leave</button>
    <button id="backHomeBtn">Back Home</button>
</div>

        <p class="small-note">Browser will ask microphone permission. Click Allow.</p>
    </div>
</div>

<div class="audio-confirm-box" id="audioConfirmBox">
    <div class="audio-confirm-content">
        <h3 id="audioConfirmTitle">Are you sure?</h3>
        <p id="audioConfirmMessage">Do you want to continue?</p>

        <button id="audioConfirmActionBtn">Confirm</button>
        <button id="audioCancelActionBtn">Cancel</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="audio.js?v=300"></script>

<div class="footer-links">
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="safety.html">Safety</a>
    <a href="contact.html">Contact</a>
</div>

</body>
</html>
